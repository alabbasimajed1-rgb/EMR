name: emr_app
description: "A new Flutter project for Medical Records."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # المكتبة الأساسية للتعامل مع قاعدة البيانات المحلية
  sqflite: ^2.3.0
  # المكتبة المطلوبة لتحديد مسارات الملفات (لإدارة قاعدة البيانات)
  path: ^1.9.0
  # المكتبة التي طلبتها لتخزين الإعدادات وبيانات الدخول محلياً
  shared_preferences: ^2.2.0
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  flutter create .

