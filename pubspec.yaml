name: emr
description: Electronic Medical Records Application (Local Storage & Drive Backup)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # --- مكتبات التخزين المحلي والنسخ الاحتياطي السحابي ---
  sqflite: ^2.3.0
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  googleapis_auth: ^1.6.0
  http: ^1.2.0 # مكتبة ضرورية للاتصال بخدمات جوجل
  workmanager: ^0.5.2 # لعمل التزامن التلقائي في الخلفية

  # --- المكتبات الأساسية للتطبيق (التي كنت تستخدمها سابقاً) ---
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  image_picker: ^1.1.2
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
