name: emr_app
description: Electronic Medical Records Application
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0 # لقاعدة البيانات المحلية
  path: ^1.9.0
  google_sign_in: ^6.2.1 # لتسجيل الدخول بحساب جوجل
  googleapis: ^13.0.0 # للتعامل مع Google Drive
  http: ^1.2.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
