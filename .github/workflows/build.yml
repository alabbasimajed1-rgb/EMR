name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: Fix Gradle Permissions
      run: |
        cd android
        chmod +x gradlew
        chmod +x gradlew.bat 2>/dev/null || true
        ls -la gradlew
        cd ..
    
    - name: Verify Setup
      run: |
        echo "=== Flutter ==="
        flutter --version
        echo "=== Java ==="
        java --version
        echo "=== Check Gradle ==="
        cd android && ./gradlew --version || echo "Gradle check complete"
    
    - name: Clean Project
      run: flutter clean
    
    - name: Get Dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Success Message
      if: success()
      run: echo "🎉 Build completed successfully!"
