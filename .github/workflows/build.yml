name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: Verify Environment
      run: |
        echo "=== Flutter Version ==="
        flutter --version
        echo "=== Java Version ==="
        java --version
        echo "=== Gradle Version ==="
        cd android && ./gradlew --version
    
    - name: Clean Project
      run: |
        flutter clean
        rm -rf android/.gradle
        rm -rf android/app/build
    
    - name: Get Dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Build Summary
      if: success()
      run: |
        echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "- 📱 **APK**: app-release.apk" >> $GITHUB_STEP_SUMMARY
        echo "- 📦 **Size**: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- 🏷️ **Flutter**: $(flutter --version | head -n 1)" >> $GITHUB_STEP_SUMMARY
        echo "- 📅 **Build Time**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
